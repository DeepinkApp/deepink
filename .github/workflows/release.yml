name: Release version

permissions:
  # required to create releases / upload assets
  contents: write

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

jobs:
  wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Cache WASM build
        id: twofish-cache
        uses: actions/cache@v4
        with:
          path: packages/twofish/dist
          key: twofish-${{ hashFiles( 'packages/twofish/**', '!packages/twofish/dist/**' )
            }}

      - name: Set UID/GID
        shell: bash
        run: |
          echo "DOCKER_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "DOCKER_GID=$(id -g)" >> "$GITHUB_ENV"
          echo "UID: $(id -u) GID: $(id -g)"

      - name: Install packages
        run: npm ci

      - name: Build WASM
        if: steps.twofish-cache.outputs.cache-hit != 'true'
        run: cd packages/twofish && npm run build

      - name: Upload WASM build
        uses: actions/upload-artifact@v4
        with:
          name: twofish
          path: packages/twofish/dist

  build:
    # build for macOS, Windows and Linux
    needs: wasm
    strategy:
      matrix:
        # TODO: add `macos-15-intel` for production releases
        # See docs https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#standard-github-hosted-runners-for-public-repositories
        # os: [ macos-latest, ubuntu-latest, windows-latest ]
        os: [ windows-latest ]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Download WASM
        uses: actions/download-artifact@v4
        with:
          name: twofish
          path: packages/twofish/dist

      # Setup macOS
      - name: "macOS: accept Xcode license (required before building)"
        if: runner.os == 'macOS'
        run: |
          # ensure Xcode path and accept license
          if [ -d "/Applications/Xcode.app" ]; then
            sudo xcode-select --switch /Applications/Xcode.app || true
            sudo xcodebuild -license accept || true
          else
            echo "Warning: /Applications/Xcode.app not found on runner. If this step fails on self-hosted mac runners, ensure Xcode is installed."
          fi

      # Import certificate
      - name: Setup keychain
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Setup keychain
          security create-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          # Make it default + unlocked
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          # Import certificate
          printf "%s" "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          # See details in https://github.com/electron/forge/issues/3315#issuecomment-1721732436
          security import cert.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild

          # Set access
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          # Print info for debug
          security find-identity -v -p codesigning
          security list-keychains -s build.keychain

      - name: Verify WiX installation
        if: runner.os == 'Windows'
        shell: powershell
        continue-on-error: true
        run: |
          $env:PATH = "C:\wix314;$env:PATH"
          candle.exe -? 2>&1 | Select-Object -First 1
          light.exe -? 2>&1 | Select-Object -First 1
          exit 0  # Force success exit code

      - name: Install packages
        run: npm ci

      # TODO: move the build into cache, and only package and sign it here
      - name: Build app
        working-directory: packages/app
        env:
          OSX_SIGN_IDENTITY: ${{ secrets.OSX_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEBUG: electron-notarize*
        run: |
          npm run build
          npm run make

      - name: Upload artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: packages/app
        run: |
          npx tsx ./scripts/publish --dir ./out/make --overwrite
